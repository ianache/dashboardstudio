# Default values for dashboardstudio.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

environment: dev

# Global settings for Ingress and DNS
global:
  domainSuffix: comsatel.com.pe

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: comsatel/dashboardstudio-backend
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""

  service:
    type: ClusterIP
    port: 8000

  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: letsencrypt-dev
    tls: true

  env:
    POSTGRES_HOST: postgres-service
    POSTGRES_PORT: 5432
    POSTGRES_USER: biportal
    POSTGRES_DB: biportal
    POSTGRES_SCHEMA: biportal
    KEYCLOAK_URL: https://oauth2.qa.comsatel.com.pe
    KEYCLOAK_REALM: microservicios
    KEYCLOAK_CLIENT_ID: bi-backend
    APP_HOST: 0.0.0.0
    APP_PORT: 8000
    DEBUG: "false"

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: comsatel/dashboardstudio-frontend
    pullPolicy: IfNotPresent
    tag: ""

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
      cert-manager.io/cluster-issuer: letsencrypt-dev
    tls: true

  env:
    VITE_API_URL: https://backend.dev.comsatel.com.pe
    VITE_CUBEJS_API_URL: https://cubejs.dev.comsatel.com.pe/cubejs-api/v1
    VITE_KEYCLOAK_URL: https://oauth2.qa.comsatel.com.pe
    VITE_KEYCLOAK_REALM: microservicios
    VITE_KEYCLOAK_CLIENT_ID: dashboard-app

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
